# P5 Theme E: nginx reverse-proxy for the frontend container.
#
# Mirrors the Vite dev proxy in vite.config.ts so the SPA can hit
# /api/*  → world's HTTP routes
# /ws/*   → world's WebSocket routes
# /metrics → prom scrape endpoint (read-only, useful for the
#            observability profile's prometheus to scrape via the
#            frontend's hostname if needed)
# everything else falls through to the SPA bundle.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Trivial healthcheck endpoint (Dockerfile HEALTHCHECK probes it).
    location = /health.txt {
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://world:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
        proxy_pass http://world:8080;
        proxy_http_version 1.1;
    }

    location /ws/ {
        proxy_pass http://world:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA fallback — every other GET serves index.html so client-side
    # routing (/console, /town/:id) works on first-load.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
