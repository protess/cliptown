name: Bench

on:
  pull_request:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.86.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run criterion benches
        run: cargo bench -p cliptown-world
      - name: Check regression gate
        # M10.1: 20% tolerance. The baselines in bench/baselines.json were
        # captured on developer hardware; the first CI run will tell us
        # whether ubuntu-latest needs its own numbers. `continue-on-error`
        # keeps the gate informational while we collect a few CI samples
        # — flip to `false` once the baseline has been re-calibrated for
        # the CI environment.
        id: gate
        continue-on-error: true
        run: |
          node bench/check.mjs | tee /tmp/bench-result.json
      - name: Publish bench result to job summary
        if: always()
        run: |
          {
            echo '## Bench regression gate';
            echo '```json';
            if [ -s /tmp/bench-result.json ]; then
              cat /tmp/bench-result.json
            else
              echo '(no result produced — check the previous step log)'
            fi
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
