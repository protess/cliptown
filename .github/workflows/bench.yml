name: Bench

on:
  pull_request:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.86.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run criterion benches
        run: cargo bench -p cliptown-world
      - name: Check regression gate
        # 20% tolerance against CI-calibrated baselines (see
        # bench/baselines.json `_ci_samples_*`). Flipped to a hard gate
        # 2026-05-13 after 3 post-Phase-3 CI runs landed inside the
        # tolerance window. If this starts flapping, average 3+ fresh
        # successful CI medians and update the baselines rather than
        # widening the tolerance.
        id: gate
        run: |
          node bench/check.mjs | tee /tmp/bench-result.json
      - name: Publish bench result to job summary
        if: always()
        run: |
          {
            echo '## Bench regression gate';
            echo '```json';
            if [ -s /tmp/bench-result.json ]; then
              cat /tmp/bench-result.json
            else
              echo '(no result produced — check the previous step log)'
            fi
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
