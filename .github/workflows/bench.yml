name: Bench

on:
  pull_request:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.86.0
      - name: Run criterion benches (log-only Phase 0)
        run: cargo bench -p cliptown-world --no-run  # compiles but doesn't run; flip to no flag in Phase 1
      - name: Surface baselines
        run: cat bench/baselines.json
