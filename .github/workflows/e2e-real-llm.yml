name: E2E Real LLM

on:
  workflow_dispatch:
    inputs:
      budget_cap_usd:
        description: "Per-run budget cap in USD"
        required: true
        default: "0.50"
        type: string

concurrency:
  group: e2e-real-llm
  cancel-in-progress: false

jobs:
  e2e-real:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_LLM: real
      E2E_BUDGET_CAP_USD: ${{ inputs.budget_cap_usd }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.86.0
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build rust
        run: cargo build --workspace --release
      - name: Build TS
        run: pnpm -r build
      - name: Validate budget cap input
        run: |
          set -e
          if [ -z "$E2E_BUDGET_CAP_USD" ] || [ "$(echo "$E2E_BUDGET_CAP_USD <= 0" | bc -l)" = "1" ]; then
            echo "::error::Invalid budget cap: '$E2E_BUDGET_CAP_USD'"
            exit 1
          fi
          echo "Budget cap: \$$E2E_BUDGET_CAP_USD"
      - name: Install claude CLI
        # M9.10 C — pin a known claude-code version. `@latest` here would
        # silently break the workflow on upstream releases; bump
        # deliberately after running scripts/smoke-real-llm.sh against the
        # new version. The pin captures the version that exists at the time
        # this step is written, not a verified-good version — the first
        # successful workflow run is the verification.
        run: npm install -g @anthropic-ai/claude-code@2.1.138
      - name: Run E2E real-LLM
        id: run_e2e
        run: |
          set -o pipefail
          # `--silent` strips pnpm's own logging so the JSON summary on stdout
          # is the only thing piped to the result file. The runner exits
          # non-zero on any failure; pipefail propagates that to this step.
          pnpm -F @cliptown/e2e-real-llm --silent start | tee /tmp/e2e-result.json
      - name: Publish result to job summary
        # Always runs so the JSON summary lands in the GitHub job summary
        # even when the runner failed (which is when operators need it most).
        if: always()
        run: |
          {
            echo '## E2E Real-LLM Result';
            echo '```json';
            if [ -s /tmp/e2e-result.json ]; then
              cat /tmp/e2e-result.json
            else
              echo '(runner produced no JSON output — check the previous step log)'
            fi
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
