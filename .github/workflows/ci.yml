name: CI
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      # `version` is sourced from package.json's `packageManager` field.
      # Specifying it here too triggers ERR_PNPM_BAD_PM_VERSION in v4.
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: Enforce log shape
        run: |
          ! rg -n 'tracing::(info|warn|error)' crates/ | rg -v 'component\s*=' || (echo "Missing component= field" && exit 1)
      - name: Build (Rust → TS)
        run: pnpm build
      - name: Rust tests
        run: pnpm test:rust
      - name: TS tests
        run: pnpm test:ts
      - name: Install Playwright browsers
        run: pnpm --filter @cliptown/frontend e2e:install
      - name: E2E (mocked LLM)
        run: pnpm test:e2e

      # P5 Theme E: verify both images build without pushing. Catches
      # Dockerfile regressions before they break the tag-triggered
      # release.yml run. Using `--load` keeps the images locally so
      # docker-compose config validation can reference them.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker build smoke (world)
        run: docker buildx build --load -t cliptown-world:ci -f Dockerfile .
      - name: Docker build smoke (frontend)
        run: docker buildx build --load -t cliptown-frontend:ci -f packages/frontend/Dockerfile .
      - name: Validate docker-compose
        run: docker compose config > /dev/null
      - name: Validate docker-compose observability profile
        run: docker compose --profile observability config > /dev/null
