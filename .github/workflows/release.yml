# P5 Theme E: tag-triggered release pipeline.
#
# Builds + pushes both images (world + frontend) to GHCR. Triggered by
# any tag matching `v*` (e.g. `v0.1.0`, `v0.1.0-rc.1`). Each image gets
# the version tag plus `latest`. Multi-arch (amd64 + arm64) via buildx.
#
# Manual smoke-test from a workstation before tagging:
#   docker compose build
#   docker compose up -d
#   curl http://localhost:8080/health
#   curl http://localhost:3000/health.txt
#
# Required repo secrets: GITHUB_TOKEN is auto-issued; nothing else
# needed for GHCR push within the same org.

name: Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: world
            dockerfile: Dockerfile
            image: cliptown-world
          - name: frontend
            dockerfile: packages/frontend/Dockerfile
            image: cliptown-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version tag
        id: vars
        run: |
          # Strip the leading "v" for the image tag.
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "repo_lc=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build + push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_lc }}/${{ matrix.image }}:${{ steps.vars.outputs.version }}
            ghcr.io/${{ steps.vars.outputs.repo_lc }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
