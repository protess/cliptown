# P5 Theme E: auto-provision the Prometheus datasource so the
# dashboard imports cleanly without manual setup. UID matches the
# `datasource.uid` field in cliptown-overview.json.
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true
    editable: false
