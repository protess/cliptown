# P5 Theme E: Prometheus config for the docker-compose observability
# profile. Scrapes the world container's /metrics endpoint every 15s
# and loads the cliptown alert rules from the same docs/ directory.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/cliptown.yml

scrape_configs:
  - job_name: cliptown-world
    metrics_path: /metrics
    static_configs:
      - targets:
          - world:8080
        labels:
          deploy: docker-compose
